const HERO_POS = {
  bird: { cx: 23.5, cy: 27, r: 14 },
  sky: { cx: 72, cy: 27, r: 14 },
  earth: { cx: 35, cy: 65, r: 14 },
  seed: { cx: 54, cy: 62, r: 10 },
};
function HeroScene({ onStart }) {
  const cycle = ["sky", "bird", "earth", "seed"];
  const [focus, setFocus] = useState("earth");
  const [locked, setLocked] = useState(false);
  useEffect(() => {
    if (locked) return;
    const t = setInterval(() => setFocus((f) => cycle[(cycle.indexOf(f) + 1) % 4]), 3000);
    return () => clearInterval(t);
  }, [locked]);
  const pick = (t) => { setFocus(t); setLocked(true); };
  const F = TYPES[focus];
  return (
    <div>
      <div style={S.heroBox}>
        <img src={HERO_BG} alt="네 가지 결이 사는 밤 풍경" style={S.heroBg} />
        {cycle.map((t) => {
          const p = HERO_POS[t], on = focus === t;
          return (
            <button key={t} onClick={() => pick(t)} aria-label={TYPES[t].name}
              style={{ position: "absolute", left: p.cx + "%", top: p.cy + "%", width: (p.r * 2) + "%", aspectRatio: "1", transform: "translate(-50%,-50%)", borderRadius: "50%", border: on ? `2px solid ${TYPES[t].color}` : "2px solid transparent", background: on ? `radial-gradient(circle, ${TYPES[t].color}33 0%, ${TYPES[t].color}14 45%, transparent 70%)` : "transparent", boxShadow: on ? `0 0 22px ${TYPES[t].color}aa` : "none", cursor: "pointer", transition: "all .5s ease", padding: 0 }} />
          );
        })}
      </div>
      <div key={focus} className="fade" style={S.heroLine}>
        <span style={{ color: F.color, fontWeight: 800, fontSize: 15.5, display: "inline-flex", alignItems: "center", gap: 5, justifyContent: "center" }}><Cico type={focus} size={22} /> ‘{F.name}’ 같은 아이</span>
        <div style={S.heroLineTxt}>{HERO_LINES[focus]}</div>
      </div>
      <div style={S.heroTapHint}>풍경 속 네 가지 결을 눌러 살펴보실 수 있습니다</div>
      <button style={S.heroCta} onClick={onStart}>우리 아이 결 알아보기</button>
    </div>
  );
}

// 부모×아이 조합 — 영향(잘 맞아요/부딪혀요) + 방법
function ComboBlock({ p, c, pName, cName }) {
  const D = COMBO[`${p}_${c}`];
  if (!D) return null;
  const PT = TYPES[p], CT = TYPES[c];
  return (
    <div style={S.comboCard}>
      <div style={{ ...S.comboHead, display: "flex", alignItems: "center", gap: 4, flexWrap: "wrap" }}><Cico type={p} size={20} /><span style={{ opacity: 0.6 }}>×</span><Cico type={c} size={20} /> <span>{pName}({PT.name}) × {withName(cName)}({CT.name})</span></div>
      <div style={S.comboSecH}><span style={{ color: "#8FD0AC" }}>✓ 잘 맞아요</span></div>
      <div style={S.comboBody}>{D.fit}</div>
      <div style={S.comboSecH}><span style={{ color: "#FF9E6D" }}>⚡ 여기서 부딪혀요</span></div>
      <div style={S.comboBody}>{D.clash}</div>
      <div style={S.comboSecH}><span style={{ color: C.gold }}>🌱 이렇게 해보세요</span></div>
      {D.how.map((h, i) => <div key={i} style={S.comboHow}><b style={{ color: C.gold }}>{i + 1}.</b> {h}</div>)}
    </div>
  );
}

const sadanDesc = {
  earth: "불편함을 견디지 못해 양보하고, 사람들 사이의 원만함과 자연스러움을 가장 소중히 여기는 마음이에요",

  seed: "맞고 틀림을 가리는, 신중하고 깊이 따지는 마음이에요",
  sky: "약한 것을 불쌍히 여기는, 원리와 이상을 좇는 마음이에요",
};

const KEY = "cheji:children:v1";
const SITE_URL = "https://pagodream.github.io/temperament/"; // 배포 주소

// 받침 있는 이름엔 '이'를 붙여 조사가 자연스럽게: 다다→다다, 드림→드림이
function withName(name) {
  if (!name) return name || "";
  const c = name.charCodeAt(name.length - 1);
  const batchim = c >= 0xac00 && c <= 0xd7a3 && (c - 0xac00) % 28 !== 0;
  return batchim ? name + "이" : name;
}

// 깃허브(크롬)에선 localStorage, 클로드 환경에선 window.storage 사용
const store = {
  async get(k) { try { if (typeof window !== "undefined" && window.storage) return await window.storage.get(k); const v = localStorage.getItem(k); return v ? { value: v } : null; } catch (e) { return null; } },
  async set(k, v) { try { if (typeof window !== "undefined" && window.storage) return await window.storage.set(k, v); localStorage.setItem(k, v); } catch (e) {} },
};

// 구글시트(Apps Script 웹앱) 주소 — 배포 후 …/exec URL 붙여넣기 (양쪽 앱 동일하게)
const SHEET_API = "https://script.google.com/macros/s/AKfycbxkpIeb9FmErkwE1nDvnBa4F9L3hBg295hYd-UWksPAkYwO-MRkjHiojRFfH7thuuPY/exec";
function deviceId() { try { let id = localStorage.getItem("mc:uid"); if (!id) { id = "u" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); localStorage.setItem("mc:uid", id); } return id; } catch (e) { return "u0"; } }
async function postSheet(obj) { if (!SHEET_API) return; try { await fetch(SHEET_API, { method: "POST", mode: "no-cors", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(obj) }); } catch (e) {} }
function postCheji(child) {
  if (!child || !child.scores) return;
  const t = TYPES[topType(child.scores)];
  postSheet({ source: "cheji", userId: deviceId(), 아이이름: child.name, 역할: child.isParent ? "부모" : "아이", 결과: t.name, 사상: t.sasang, 새: child.scores.bird, 하늘: child.scores.sky, 땅: child.scores.earth, 뿌리: child.scores.seed, 방식: child.mode === "easy" ? "간편" : "정밀", 응답수: child.done || "", 전체: child.total || "" });
}

function App() {
  const [children, setChildren] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [view, setView] = useState({ s: "home" }); // home | add | mode | test | result
  const [name, setName] = useState("");

  useEffect(() => { (async () => {
    try { const r = await store.get(KEY); if (r && r.value) setChildren(JSON.parse(r.value)); } catch (e) {}
    setLoaded(true);
  })(); }, []);
  const save = async (list) => { setChildren(list); try { await store.set(KEY, JSON.stringify(list)); } catch (e) {} };
  const removeChild = async (c) => {
    save(children.filter((x) => x.id !== c.id));
    try { await store.set(`cheji:prog:${c.id}:easy`, ""); await store.set(`cheji:prog:${c.id}:full`, ""); } catch (e) {}
  };

  return (
    <div style={S.root}>
      <style>{CSS}</style>
      <div style={S.frame}>
        {view.s !== "home" && (
          <button style={S.topHome} onClick={() => setView({ s: "home" })} aria-label="홈으로">
            <span style={S.topHomeIcon}>⌂</span> 홈
          </button>
        )}
        {view.s === "home" && <Home children={children} loaded={loaded} onIntro={() => setView({ s: "intro" })} onAdd={() => { setName(""); setView({ s: "add" }); }}
          onAddParent={() => { setName(""); setView({ s: "add", parent: true }); }}
          onDelete={removeChild}
          onPick={(id) => { const ch = children.find((c) => c.id === id); ch && ch.scores ? setView({ s: "result", id }) : setView({ s: "mode", id }); }} />}
        {view.s === "intro" && <Intro onBack={() => setView({ s: "home" })} onStart={() => setView(children.length ? { s: "home" } : { s: "add" })} />}
        {view.s === "add" && <AddChild parent={view.parent} name={name} setName={setName} onBack={() => setView({ s: "home" })}
          onSave={() => { if (!name.trim()) return; const id = Date.now(); save([...children, { id, name: name.trim(), isParent: !!view.parent }]); setView({ s: "mode", id }); }} />}
        {view.s === "mode" && <ModePick child={children.find((c) => c.id === view.id)} onBack={() => setView({ s: "home" })}
          onPick={(mode) => setView({ s: "test", id: view.id, mode })} />}
        {view.s === "test" && <Test child={children.find((c) => c.id === view.id)} mode={view.mode} onBack={() => setView({ s: "home" })}
          onDone={(scores, answers, done, total) => { const list = children.map((c) => c.id === view.id ? { ...c, scores, answers, done, total, mode: view.mode, date: new Date().toISOString() } : c); save(list); postCheji(list.find((c) => c.id === view.id)); setView({ s: "result", id: view.id }); }} />}
        {view.s === "result" && <Result child={children.find((c) => c.id === view.id)}
          parent={children.find((c) => c.isParent && c.scores)}
          kids={children.filter((c) => !c.isParent && c.scores)}
          onHome={() => setView({ s: "home" })}
          onDeep={(t) => setView({ s: "deep", id: view.id, type: t })}
          onRetake={() => setView({ s: "mode", id: view.id })} />}
        {view.s === "deep" && <DeepView child={children.find((c) => c.id === view.id)} type={view.type} onBack={() => setView({ s: "result", id: view.id })} />}
      </div>
    </div>
  );
}

function Test({ child, mode, onDone, onBack }) {
  const isP = !!(child && child.isParent);
  const items = (mode === "easy" ? ITEMS.filter((i) => i.c) : ITEMS).map((it, idx) => ({ ...it, idx }));
  const [shuffled] = useState(() => [...items].sort(() => Math.random() - 0.5));
  // 결정 문항도 보기 순서를 섞어 위치 편향 제거
  const [choices] = useState(() => CHOICES.map((c) => ({ ...c, opts: [...c.opts].sort(() => Math.random() - 0.5) })));
  const [ans, setAns] = useState({}); // idx -> 0~4
  const [cAns, setCAns] = useState({}); // 결정문항 qi -> type
  const [resumed, setResumed] = useState(false);
  const PKEY = `cheji:prog:${child ? child.id : "x"}:${mode}`;
  // 진행 복원 — 중간에 나가도 이어서
  useEffect(() => { (async () => {
    try { const r = await store.get(PKEY); if (r && r.value) { const p = JSON.parse(r.value); if (p && (Object.keys(p.ans || {}).length || Object.keys(p.cAns || {}).length)) { setAns(p.ans || {}); setCAns(p.cAns || {}); setResumed(true); } } } catch (e) {}
  })(); }, []);
  // 진행 자동저장
  useEffect(() => { if (Object.keys(ans).length || Object.keys(cAns).length) store.set(PKEY, JSON.stringify({ ans, cAns })); }, [ans, cAns]);
  const setVal = (idx, v) => setAns((a) => ({ ...a, [idx]: v }));
  const setChoice = (qi, t) => setCAns((a) => ({ ...a, [qi]: t }));
  const done = Object.keys(ans).length;
  const cDone = Object.keys(cAns).length;
  const pct = Math.round(((done + cDone) / (items.length + choices.length)) * 100);
  const finish = () => {
    // 1) 리커트 점수(유형별 %)
    const lik = {};
    for (const t of ORDER) {
      const its = items.filter((i) => i.t === t);
      const sum = its.reduce((s, i) => s + (ans[i.idx] || 0), 0);
      lik[t] = its.length ? (sum / (4 * its.length)) * 100 : 0;
    }
    // 2) 결정 문항 득표(유형별 %)
    const votes = {}; ORDER.forEach((t) => (votes[t] = 0));
    Object.values(cAns).forEach((t) => { if (t in votes) votes[t] += 1; });
    // 3) 블렌딩 — 결정 문항을 답했으면 50:50, 아니면 리커트만
    const wC = cDone ? 0.5 : 0;
    const scores = {};
    for (const t of ORDER) {
      const ch = cDone ? (votes[t] / cDone) * 100 : 0;
      scores[t] = Math.round((1 - wC) * lik[t] + wC * ch);
    }
    store.set(PKEY, ""); // 진행 기록 비우기
    onDone(scores, { ans, cAns }, done, items.length);
  };
  const LV = [["전혀", 0], ["아니다", 1], ["보통", 2], ["그렇다", 3], ["매우", 4]];
  return (
    <div className="fade" style={{ display: "flex", flexDirection: "column", minHeight: "calc(100vh - 52px)" }}>
      <div style={S.testHead}>
        <button style={S.text} onClick={onBack}>나가기</button>
        <span style={S.testCount}>{child?.name} · {done}/{items.length}</span>
      </div>
      <div style={S.progBg}><div style={{ ...S.progFill, width: `${pct}%` }} /></div>
      {resumed && <div style={S.resumeNote}>이전에 하던 검사를 이어서 진행해요. 답은 그대로 저장돼 있어요.</div>}
      <div style={S.testHint}>{isP ? "나 자신을 떠올리며, 각 문장이 얼마나 맞는지 선택해 주세요." : "아이를 떠올리며, 각 문장이 얼마나 맞는지 선택해 주세요."} 망설여지면 가운데 ‘보통’, 맞지 않으면 ‘전혀’를 선택하셔도 됩니다.</div>
      <div style={{ flex: 1 }}>
        {shuffled.map((it) => (
          <div key={it.idx} style={S.qRow2}>
            <div style={S.qText}>{isP ? parentize(it.s) : it.s}</div>
            <div style={S.lvRow}>
              {LV.map(([lab, v]) => {
                const on = ans[it.idx] === v;
                return <button key={v} onClick={() => setVal(it.idx, v)} style={{ ...S.lvBtn, ...(on ? S.lvOn : {}) }}>{lab}</button>;
              })}
            </div>
          </div>
        ))}

        <div style={S.cSecHead}>마지막 — 딱 하나만 골라요</div>
        <div style={S.cSecSub}>가장 비슷한 모습 하나를 고르면 결과가 훨씬 또렷해져요. ({cDone}/{choices.length})</div>
        {choices.map((c, qi) => (
          <div key={qi} style={S.cCard}>
            <div style={S.cQ}>{isP ? parentize(c.q) : c.q}</div>
            {c.opts.map((o) => {
              const on = cAns[qi] === o.t;
              return (
                <button key={o.t} onClick={() => setChoice(qi, o.t)} style={{ ...S.cOpt, ...(on ? { borderColor: TYPES[o.t].color, background: TYPES[o.t].color + "22", color: C.cream } : {}) }}>
                  <span style={{ ...S.cDot, background: on ? TYPES[o.t].color : "transparent", borderColor: TYPES[o.t].color }} />
                  <span>{o.s}</span>
                </button>
              );
            })}
          </div>
        ))}
      </div>
      <div style={S.testFootWrap}>
        <button style={S.primary} onClick={finish}>결과 보기</button>
      </div>
    </div>
  );
}

function Result({ child, parent, kids, onHome, onRetake, onDeep }) {
  const [copied, setCopied] = useState(false);
  const [saved, setSaved] = useState(false);
  async function share() {
    if (!child || !child.scores) return;
    const tt = TYPES[topType(child.scores)];
    const txt = child.isParent
      ? `나는 ‘${tt.name}’ 결의 부모래요 ${tt.emoji}\n부모와 아이의 ‘결’을 알면 칭찬법·공부법이 달라져요. 무료 진단:\n${SITE_URL}`
      : `「${withName(child.name)}」는 ‘${tt.name}’ 같은 아이래요 ${tt.emoji}\n아이마다 공부하는 ‘결’이 달라요. 우리 아이 체질 학습 진단(무료):\n${SITE_URL}`;
    try { if (navigator.share) { await navigator.share({ title: "체질 학습 진단", text: txt, url: SITE_URL }); return; } } catch (e) { if (e && e.name === "AbortError") return; }
    try { await navigator.clipboard.writeText(txt); } catch (e) {}
    setCopied(true); setTimeout(() => setCopied(false), 2200);
  }
  // ⑥ 결과 이미지 카드 (1080×1350 PNG)
  async function saveCard() {
    if (!child || !child.scores) return;
    const tt = TYPES[topType(child.scores)];
    const topKey = topType(child.scores);
    // 캐릭터 이미지 미리 로드
    const charImg = await new Promise((res) => { const im = new Image(); im.onload = () => res(im); im.onerror = () => res(null); im.src = CHAR_IMG[topKey]; });
    const W = 1080, H = 1350, cv = document.createElement("canvas"); cv.width = W; cv.height = H;
    const x = cv.getContext("2d");
    x.fillStyle = "#0C1230"; x.fillRect(0, 0, W, H);
    const g = x.createLinearGradient(0, 0, 0, H); g.addColorStop(0, "rgba(242,193,107,0.10)"); g.addColorStop(0.4, "rgba(242,193,107,0)"); x.fillStyle = g; x.fillRect(0, 0, W, H);
    x.strokeStyle = "rgba(242,193,107,0.5)"; x.lineWidth = 4; x.strokeRect(36, 36, W - 72, H - 72);
    x.textAlign = "center";
    x.font = "44px sans-serif"; x.fillStyle = "#F2C16B"; x.fillText("체질 학습 진단", W / 2, 150);
    // 캐릭터(색 원 + 그림)
    const cyAv = 330, rAv = 130;
    x.fillStyle = tt.color + "33"; x.beginPath(); x.arc(W / 2, cyAv, rAv, 0, Math.PI * 2); x.fill();
    if (charImg) {
      const iw = charImg.width, ih = charImg.height, sc = (rAv * 1.7) / Math.max(iw, ih);
      x.drawImage(charImg, W / 2 - iw * sc / 2, cyAv - ih * sc / 2, iw * sc, ih * sc);
    } else { x.font = "150px serif"; x.fillText(tt.emoji, W / 2, cyAv + 52); }
    x.font = "bold 76px sans-serif"; x.fillStyle = tt.color; x.fillText(`${withName(child.name)}는 ‘${tt.name}’의 결`, W / 2, 540);
    x.font = "40px sans-serif"; x.fillStyle = "rgba(244,239,230,0.75)"; x.fillText(`${tt.sasang} · ${tt.sadan}`, W / 2, 600);
    // 본질 한 줄 (수동 줄바꿈)
    x.font = "italic 42px sans-serif"; x.fillStyle = "#F4EFE6";
    const words = tt.essence.split(" "); let line = "", lines = [];
    for (const w of words) { const t2 = line ? line + " " + w : w; if (x.measureText(t2).width > W - 220) { lines.push(line); line = w; } else line = t2; }
    if (line) lines.push(line);
    lines.slice(0, 3).forEach((l, i) => x.fillText(l, W / 2, 690 + i * 60));
    // 네 결 막대
    const ranked2 = ORDER.map((t) => ({ t, v: child.scores[t] })).sort((a, b) => b.v - a.v);
    const bx = 150, bw = W - 300, by = 900;
    x.textAlign = "left"; x.font = "36px sans-serif";
    ranked2.forEach((r, i) => {
      const y = by + i * 88;
      x.fillStyle = "#F4EFE6"; x.fillText(`${TYPES[r.t].name}`, bx, y);
      x.fillStyle = "rgba(255,255,255,0.10)"; x.fillRect(bx + 220, y - 28, bw - 320, 34);
      x.fillStyle = TYPES[r.t].color; x.fillRect(bx + 220, y - 28, (bw - 320) * (r.v / 100), 34);
      x.fillText(`${r.v}%`, bx + bw - 80, y);
    });
    x.textAlign = "center"; x.font = "34px sans-serif"; x.fillStyle = "rgba(244,239,230,0.6)";
    x.fillText("마더클럽 · 우리 아이 결 무료 진단", W / 2, H - 110);
    x.fillStyle = "#F2C16B"; x.fillText(SITE_URL.replace("https://", ""), W / 2, H - 60);
    cv.toBlob(async (blob) => {
      if (!blob) return;
      const file = new File([blob], `체질진단_${child.name}.png`, { type: "image/png" });
      try { if (navigator.canShare && navigator.canShare({ files: [file] })) { await navigator.share({ files: [file], title: "체질 학습 진단" }); return; } } catch (e) { if (e && e.name === "AbortError") return; }
      const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = file.name; a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 4000);
      setSaved(true); setTimeout(() => setSaved(false), 2200);
    }, "image/png");
  }
  if (!child || !child.scores) return null;
  const ranked = ORDER.map((t) => ({ t, v: child.scores[t] })).sort((a, b) => b.v - a.v);
  const top = ranked[0].t, second = ranked[1].t;
  const T = TYPES[top], T2 = TYPES[second];
  const gap = ranked[0].v - ranked[1].v;
  const close = gap <= 12;
  const total = child.total || 0, done = child.done || 0;
  const weak = ranked[0].v < 25;
  const sparse = total > 0 && done < total * 0.4;
  return (
    <div className="fade">
      <div style={{ textAlign: "center", marginTop: 6 }}>
        <div style={{ display: "flex", justifyContent: "center" }}><Avatar type={top} size={92} ring={true} /></div>
        <div style={{ ...S.resName, color: T.color }}>{withName(child.name)}는 ‘{T.name}’의 결</div>
        <div style={S.resSub}>{T.sasang} · {T.sadan}{T.rare ? " · 아주 드문 유형" : ""}</div>
        <div style={S.resEss}>{T.essence}</div>
      </div>

      <div style={S.bars}>
        {ranked.map(({ t, v }) => (
          <div key={t} style={{ marginBottom: 10 }}>
            <div style={S.barTop}><span style={{ display: "inline-flex", alignItems: "center", gap: 5 }}><Cico type={t} size={20} /> {TYPES[t].name} <span style={{ color: C.mute }}>({TYPES[t].sasang})</span></span><span style={{ color: TYPES[t].color, fontWeight: 700 }}>{v}%</span></div>
            <div style={S.barBg}><div style={{ ...S.barFill, width: `${v}%`, background: TYPES[t].color }} /></div>
          </div>
        ))}
      </div>

      <Section title="이 아이의 결">{T.desc}</Section>
      <Section title="이렇게 공부할 때 즐거워요" accent={T.color}>{T.study}</Section>

      <div style={S.guideRow}>
        <div style={{ ...S.guideCol, borderColor: "rgba(143,208,172,0.3)" }}>
          <div style={{ ...S.guideH, color: "#8FD0AC" }}>이렇게 해주세요</div>
          {T.doIt.map((x, i) => <div key={i} style={S.guideItem}>✓ {x}</div>)}
        </div>
        <div style={{ ...S.guideCol, borderColor: "rgba(255,158,109,0.3)" }}>
          <div style={{ ...S.guideH, color: "#FF9E6D" }}>이건 피해주세요</div>
          {T.avoid.map((x, i) => <div key={i} style={S.guideItem}>✕ {x}</div>)}
        </div>
      </div>

      {(sparse || weak) && (
        <div style={S.warnNote}>응답이 적거나 약하게 나와서 결과가 또렷하지 않을 수 있어요. ‘정밀 진단’으로 다시 해보면 훨씬 정확해져요.</div>
      )}
      {close && (
        <div style={S.mixNote}>‘{T.name}’과 ‘{T2.name}’의 결이 {gap}%p 차이로 가깝게 나타났습니다. 아이는 한 가지 결로만 나뉘지 않으니, 두 결을 <b>함께</b> 살펴봐 주세요. 아래에 두 번째 결도 정리했습니다.</div>
      )}
      {close && (

          <div style={{ ...S.secondHead, color: T2.color, display: "flex", alignItems: "center", gap: 6 }}><Cico type={second} size={20} /> 두 번째 결 · ‘{T2.name}’ ({T2.sasang})</div>
          <div style={S.secondEss}>{T2.essence}</div>
          <div style={S.secondBody}>{T2.desc}</div>
          <div style={{ ...S.secondBody, marginTop: 8 }}><b style={{ color: T2.color }}>공부</b> · {T2.study}</div>
        </div>
      )}

      {!child.isParent && (
        <div style={{ ...S.todayCard, borderColor: T.color + "55" }}>
          <div style={{ ...S.todayHead, color: T.color }}>🌱 오늘부터 한 가지</div>

        </div>
      )}

      {!child.isParent && parent && parent.scores && (

      {child.isParent && kids && kids.length > 0 && kids.map((k) => (

        <div style={{ flex: 1 }}><b style={{ color: C.cream }}>쪽쪽이 코치</b><div style={{ color: C.mute, fontSize: 12.5, marginTop: 2 }}>이 결과는 쪽쪽이가 {withName(child.name)}와의 대화에서 말투와 ‘다른 문’ 제안에 쓰여요.</div></div>
      </div>

      <button style={S.shareBtn} onClick={share}>📤 결과 공유하기</button>
      <button style={S.cardBtn} onClick={saveCard}>🖼 결과 카드 이미지 저장</button>
      {copied && <div style={S.toast}>복사됐어요! 붙여넣어 공유하세요 🐦</div>}
      {saved && <div style={S.toast}>카드 이미지가 저장됐어요 🖼</div>}

      <button style={{ ...S.deepBtn, borderColor: T.color + "66", color: T.color }} onClick={() => onDeep(top)}>📖 책이 말하는 ‘{T.name}’ 같은 아이 — 정밀 분석 읽기 ›</button>
      {close && <button style={{ ...S.deepBtn, marginTop: 8, borderColor: T2.color + "66", color: T2.color }} onClick={() => onDeep(second)}>📖 두 번째 결 ‘{T2.name}’ 정밀 분석도 읽기 ›</button>}

      <button style={{ ...S.primary, marginTop: 14 }} onClick={onHome}>완료</button>
      <button style={S.text} onClick={onRetake}>다시 검사하기</button>
      <div style={S.note}>※ 참고용 자료입니다. 단정하기보다, 아이를 더 깊이 관찰하는 렌즈로 활용해 주세요.</div>
    </div>
  );
}

function Section({ title, children, accent }) {
  return (<div style={S.section}><div style={{ ...S.sectionH, color: accent || C.gold }}>{title}</div><div style={S.sectionB}>{children}</div></div>);
}

function topType(scores) { return ORDER.map((t) => ({ t, v: scores[t] })).sort((a, b) => b.v - a.v)[0].t; }
// 캐릭터 아바타 — 색 원 안에 캐릭터 전신(이모지 대체)
function Avatar({ type, size = 44, ring = false, fallback = "👶" }) {
  if (!type) return <span style={{ width: size, height: size, borderRadius: "50%", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.5, background: "rgba(255,255,255,0.06)", flexShrink: 0 }}>{fallback}</span>;
  const c = TYPES[type].color;
  return (
    <span style={{ width: size, height: size, borderRadius: "50%", display: "inline-flex", alignItems: "center", justifyContent: "center", background: `radial-gradient(circle at 50% 38%, ${c}3a, ${c}14)`, border: ring ? `2px solid ${c}55` : "none", flexShrink: 0, overflow: "hidden" }}>
      <img src={CHAR_IMG[type]} alt={TYPES[type].name} style={{ width: "88%", height: "88%", objectFit: "contain", display: "block" }} />
    </span>
  );
}
// 인라인 작은 캐릭터(텍스트 옆)
function Cico({ type, size = 20 }) {
  return <img src={CHAR_IMG[type]} alt={TYPES[type].name} style={{ height: size, width: size, objectFit: "contain", verticalAlign: "-0.28em", margin: "0 1px" }} />;
}
